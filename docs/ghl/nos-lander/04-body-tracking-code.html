<!--
  CDF NOS Lander — Body Tracking Code
  Page:  https://sc.capitaldf.com/nos
  Paste: GHL → Funnel → /nos page → Settings → "Body tracking code"

  TWO purposes in one block:

  1. Override the <title> and viewport meta that GHL silently strips from
     the Head Tracking Code (see README's "GHL platform quirks" section).
     Without this, document.title is empty and Google's mobile-first index
     sees a broken `viewport="width"` value.

  2. Render the mobile-only sticky phone CTA bar — the highest-conversion
     CTA channel for a 21-day-window NOS audience. tel: link auto-dials
     on tap. No TCPA exposure (user-initiated outbound).

  Deployed live 2026-06-09 (verified via Chrome extension drive).
-->

<script>
  // GHL strips <title> from head tracking code — set it client-side.
  // Google's crawler executes JS, so this title IS indexed.
  document.title = "You Have Equity. Banks Can't Unlock It. We Can. | California Notice of Sale | Capital Direct Funding";
  // GHL ships viewport meta with content="width" — fix to the standard value
  // so mobile renders correctly and the mobile-first index is satisfied.
  var vp = document.querySelector('meta[name="viewport"]');
  var fixed = 'width=device-width,initial-scale=1,viewport-fit=cover';
  if (vp) {
    vp.setAttribute('content', fixed);
  } else {
    var m = document.createElement('meta');
    m.name = 'viewport';
    m.content = fixed;
    document.head.appendChild(m);
  }
</script>
